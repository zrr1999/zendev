# PR checks: extend with more jobs (e.g. label, size) as needed.
name: CI - PR Checks

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  title:
    name: PR title
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
      - name: Check PR title
        uses: zrr1999/zendev-actions/validate-title@58f5b4600fba93a57cc340090b42da67d9f4ac70
        with:
          text: ${{ github.event.pull_request.title }}

  body:
    name: PR body
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
      - name: Check PR body
        uses: zrr1999/zendev-actions/validate-body@9febe158af61dab5ca7662debcf1eb66eb2b5574
        with:
          body: ${{ github.event.pull_request.body }}
