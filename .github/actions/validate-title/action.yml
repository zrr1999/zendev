name: Check PR title
description: >
  Validate a PR title or one-line subject against zendev emoji commit conventions.
  Uses the same rules as the zendev-commit-msg hook (is_valid_commit_message).

inputs:
  text:
    description: Text to validate (for example github.event.pull_request.title).
    required: true

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Set up uv
      uses: astral-sh/setup-uv@v6

    - name: Install validator runtime
      shell: bash
      env:
        GITHUB_ACTION_PATH: ${{ github.action_path }}
      run: |
        ROOT="$(cd "${GITHUB_ACTION_PATH}/../../.." && pwd)"
        cd "$ROOT"
        uv venv .venv
        uv pip install --python .venv/bin/python "questionary>=2.1"

    - name: Validate
      shell: bash
      env:
        INPUT_TEXT: ${{ inputs.text }}
        GITHUB_ACTION_PATH: ${{ github.action_path }}
      run: |
        ROOT="$(cd "${GITHUB_ACTION_PATH}/../../.." && pwd)"
        cd "$ROOT"
        .venv/bin/python "${GITHUB_ACTION_PATH}/validate.py"
