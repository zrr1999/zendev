name: Validate PR body
description: Validate a PR body against required H2 section headings via zendev.

inputs:
  body:
    description: PR body text (for example github.event.pull_request.body).
    required: true
  template:
    description: Path to the PR template file relative to the repo root.
    required: false
    default: ".github/pull_request_template.md"
  zendev-ref:
    description: Optional git ref used to override the bundled zendev revision.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - uses: astral-sh/setup-uv@v6

    - name: Validate body
      shell: bash
      env:
        INPUT_BODY: ${{ inputs.body }}
        INPUT_TEMPLATE: ${{ inputs.template }}
        INPUT_ZENDEV_REF: ${{ inputs.zendev-ref }}
        INPUT_ACTION_REF: ${{ github.action_ref }}
        INPUT_ACTION_REPOSITORY: ${{ github.action_repository }}
      run: |
        set -euo pipefail

        if [[ -n "${INPUT_ZENDEV_REF}" ]]; then
          zendev_source="git+https://github.com/zrr1999/zendev.git@${INPUT_ZENDEV_REF}"
        elif [[ -n "${INPUT_ACTION_REF}" && -n "${INPUT_ACTION_REPOSITORY}" ]]; then
          zendev_source="git+https://github.com/${INPUT_ACTION_REPOSITORY}.git@${INPUT_ACTION_REF}"
        else
          zendev_source="$(cd "${GITHUB_ACTION_PATH}/../.." && pwd)"
        fi

        echo "Using zendev source: ${zendev_source}"
        uvx --from "${zendev_source}" \
          zendev-validate-body "${INPUT_BODY}" --template "${INPUT_TEMPLATE}"
