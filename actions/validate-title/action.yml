name: Validate PR title
description: Validate a PR title against zendev emoji commit conventions.

inputs:
  text:
    description: Text to validate (for example github.event.pull_request.title).
    required: true

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - uses: astral-sh/setup-uv@v6

    - name: Validate title
      shell: bash
      env:
        INPUT_TEXT: ${{ inputs.text }}
      run: |
        set -euo pipefail

        zendev_root="$(cd "${GITHUB_ACTION_PATH}/../.." && pwd)"
        echo "Using zendev from ${zendev_root}"
        uvx --from "${zendev_root}" zendev-validate-title "${INPUT_TEXT}"
