name: Validate PR checklist
description: Ensure the PR body still contains every `- [x]` checklist row from the repo template.

inputs:
  body:
    description: PR body text (for example github.event.pull_request.body).
    required: true
  template:
    description: Path to the PR template file relative to the repo root.
    required: false
    default: ".github/pull_request_template.md"
  section:
    description: H2 heading title (without leading ##) that contains the checklist rows.
    required: false
    default: "Checklist"
  fail-on-empty:
    description: When true, exit 1 if the template section defines no `- [x]` rows.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - uses: astral-sh/setup-uv@v6

    - name: Validate checklist
      shell: bash
      env:
        INPUT_BODY: ${{ inputs.body }}
        INPUT_TEMPLATE: ${{ inputs.template }}
        INPUT_SECTION: ${{ inputs.section }}
        INPUT_FAIL_ON_EMPTY: ${{ inputs.fail-on-empty }}
      run: |
        set -euo pipefail

        zendev_root="$(cd "${GITHUB_ACTION_PATH}/../.." && pwd)"
        echo "Using zendev from ${zendev_root}"
        args=(zendev-validate-checklist "${INPUT_BODY}" --template "${INPUT_TEMPLATE}" --section "${INPUT_SECTION}")
        if [[ "${INPUT_FAIL_ON_EMPTY}" == "true" ]]; then
          args+=(--fail-on-empty)
        fi
        uvx --from "${zendev_root}" "${args[@]}"
